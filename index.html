<script>
  function setTheme(value) {
    document.body.className = value === 'none' ? '' : value;
  }
  function getSearchHistory() {
    return JSON.parse(localStorage.getItem("searchHistory") || "[]");
  }

 
  function search(engine) {
    const input = document.getElementById('query');
    const query = input.value.trim();
    if (!query) {
        alert("검색어를 입력하세요");
        return;}
      // 검색어 저장
saveSearchKeyword(query);  // 이 줄 추가

    // 저장
    let history = getSearchHistory();
    if (!history.includes(query)) {
      history.unshift(query);
      if (history.length > 10) history.pop();
      localStorage.setItem("searchHistory", JSON.stringify(history));
    }

    // 검색 엔진 처리
    let url = '';
    switch(engine) {
      case 'google': url = `https://www.google.com/search?q=${encodeURIComponent(query)}`; break;
      case 'naver': url = `https://search.naver.com/search.naver?query=${encodeURIComponent(query)}`; break;
      case 'daum': url = `https://search.daum.net/search?q=${encodeURIComponent(query)}`; break;
      case 'yahoo': url = `https://search.yahoo.com/search?p=${encodeURIComponent(query)}`; break;
      case 'bing': url = `https://www.bing.com/search?q=${encodeURIComponent(query)}`; break;
      case 'nate': url = `https://search.daum.net/nate?q=${encodeURIComponent(query)}`; break;
      case 'zum': url = `https://search.zum.com/search.zum?query=${encodeURIComponent(query)}`; break;
      case 'youtube': url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`; break;
      case 'images': url = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(query)}`; break;
      case 'video': url = `https://www.google.com/search?tbm=vid&q=${encodeURIComponent(query)}`; break;
      case 'blog': url = `https://search.naver.com/search.naver?ssc=tab.blog.all&sm=tab_jum&query=${encodeURIComponent(query)}`; break;
    }
    window.open(url, '_blank');
    document.getElementById('autocomplete-list').style.display = 'none';
  }

  // 클릭 외부 감지해서 리스트 숨기기
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#query') && !e.target.closest('#autocomplete-list')) {
      document.getElementById('autocomplete-list').style.display = 'none';
    }
  });
      function startVoiceRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      alert("이 브라우저는 음성 인식을 지원하지 않아요. 크롬을 사용해주세요.");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "ko-KR"; // 한국어 설정
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.start();

    recognition.onresult = function(event) {
      const speechResult = event.results[0][0].transcript;
      document.getElementById("query").value = speechResult;
      document.getElementById("autocomplete-list").style.display = 'none';
    };

    recognition.onerror = function(event) {
      alert("음성 인식 오류: " + event.error);
    };
  }
</script>

<script type="module">
  // 1. Firebase SDK import
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    query,
    orderBy,
    limit,
    serverTimestamp,
    where,
    updateDoc,
    increment
  } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
  import {
    initializeAppCheck,
    ReCaptchaV3Provider
  } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app-check.js";

  // 2. Firebase 설정
  const firebaseConfig = {
    apiKey: "AIzaSyBJeLFehOtmuxgxn2bwTiuYH_cjX0Psma8",
    authDomain: "all-in-one-search.firebaseapp.com",
    projectId: "all-in-one-search",
    storageBucket: "all-in-one-search.firebasestorage.app",
    messagingSenderId: "567332130804",
    appId: "1:567332130804:web:6067fb442c2203f2fef3a1"
  };

  // 3. Firebase 초기화
  const app = initializeApp(firebaseConfig);
  //const db = getFirestore(app);

  // ✅ App Check 초기화 (🔥 반드시 app 뒤에!)
  initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider("6Lfm7GsrAAAAAOpwwhunYJBBhcJNEYKPF9mNH1Cr"),
    isTokenAutoRefreshEnabled: true
  });
 const db = getFirestore(app);
  // 4. 검색어 저장 함수 (count 필드 포함)
  window.saveSearchKeyword = async function (queryText) {
    if (!queryText) return;
    try {
      const q = query(
        collection(db, "searches"),
        where("keyword", "==", queryText)
      );
      const querySnapshot = await getDocs(q);
      if (!querySnapshot.empty) {
        const docRef = querySnapshot.docs[0].ref;
        await updateDoc(docRef, {
          count: increment(1),
          timestamp: serverTimestamp()
        });
      } else {
        await addDoc(collection(db, "searches"), {
          keyword: queryText,
          count: 1,
          timestamp: serverTimestamp()
        });
      }
      console.log("✅ 검색어 저장 완료:", queryText);
    } catch (error) {
      console.error("❌ 저장 실패:", error);
    }
  };

  // 5. Firebase 자동완성
  async function fetchFirebaseSuggestions(input) {
    if (!input) return [];
    const q = query(
      collection(db, "searches"),
      orderBy("count", "desc"),
      limit(64)
    );
    const snapshot = await getDocs(q);
    const results = [];
    snapshot.forEach((doc) => {
      const data = doc.data();
      if (
        data.keyword &&
        typeof data.keyword === "string" &&
        data.keyword.toLowerCase().includes(input.toLowerCase())
      ) {
        results.push(data.keyword);
      }
    });
    return [...new Set(results)].slice(0, 7);
  }

  // 6. 자동완성 표시 함수
  window.showSuggestions = async function () {
    const input = document.getElementById("query");
    const list = document.getElementById("autocomplete-list");
    const queryStr = input.value.trim().toLowerCase();
    if (!queryStr) {
      list.style.display = "none";
      return;
    }
    const localHistory = JSON.parse(localStorage.getItem("searchHistory") || "[]")
      .filter((item) => item.toLowerCase().includes(queryStr))
      .slice(0, 3);
    const firebaseSuggestions = await fetchFirebaseSuggestions(queryStr);
    const combined = [...new Set([...localHistory, ...firebaseSuggestions])].slice(0, 10);
    list.innerHTML = "";
    if (combined.length > 0) {
      list.style.display = "block";
      combined.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        li.onclick = () => {
          input.value = item;
          list.style.display = "none";
        };
        list.appendChild(li);
      });
    } else {
      list.style.display = "none";
    }
  };
</script>
